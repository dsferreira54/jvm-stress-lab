---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: demo-app
  namespace: demo-app
  labels:
    app: demo-app
spec:
  lookupPolicy:
    local: false
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: demo-app
  namespace: demo-app
  labels:
    app: demo-app
spec:
  source:
    type: Git
    git:
      uri: https://github.com/dsferreira54/jvm-stress-lab.git
      ref: main
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile
  output:
    to:
      kind: ImageStreamTag
      name: demo-app:latest
  triggers:
    - type: ConfigChange
  successfulBuildsHistoryLimit: 5
  failedBuildsHistoryLimit: 5
