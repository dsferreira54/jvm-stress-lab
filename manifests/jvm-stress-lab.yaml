---
apiVersion: v1
kind: Namespace
metadata:
  name: demo-app
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: demo-app
  namespace: demo-app
  labels:
    app: demo-app
spec:
  lookupPolicy:
    local: false
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: demo-app
  namespace: demo-app
  labels:
    app: demo-app
spec:
  source:
    type: Git
    git:
      uri: https://github.com/dsferreira54/jvm-stress-lab.git
      ref: main
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile
  output:
    to:
      kind: ImageStreamTag
      name: demo-app:latest
  triggers:
    - type: ConfigChange
  successfulBuildsHistoryLimit: 5
  failedBuildsHistoryLimit: 5
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: demo-app
  labels:
    app: demo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      containers:
        - name: demo-app
          image: image-registry.openshift-image-registry.svc:5000/demo-app/demo-app:latest
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 8081
              protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: demo-app
  namespace: demo-app
  labels:
    app: demo-app
spec:
  type: ClusterIP
  selector:
    app: demo-app
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 8081
      targetPort: metrics
      protocol: TCP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: demo-app
  namespace: demo-app
  labels:
    app: demo-app
spec:
  to:
    kind: Service
    name: demo-app
  port:
    targetPort: http
